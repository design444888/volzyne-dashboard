<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volzyne | Log In</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <div class="auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <a href="index.html" class="brand">
                    <div class="brand-icon"></div>
                    Volzyne
                </a>
                <h1>Welcome back</h1>
                <p>Log in to manage your beauty business.</p>
            </div>

            <form class="auth-form" novalidate>
                <div class="form-group input-group">
                    <label>Email address</label>
                    <input type="email" name="email" class="form-input" placeholder="name@clinic.com" required>
                </div>

                <div class="form-group input-group">
                    <label>Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="text-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem;">
                    Log In
                </button>
            </form>

            <div class="divider">or continue with</div>

            <button type="button" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="text-link">Sign up</a>
            </div>

        </div>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
