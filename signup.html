<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volzyne | Sign Up</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <div class="auth-container">
        <div class="auth-card wide">
            
            <div class="auth-header">
                <a href="index.html" class="brand">
                    <div class="brand-icon"></div>
                    Volzyne
                </a>
                <h1>Create your Volzyne account</h1>
                <p>Start managing your clinic, spa, or salon smarter.</p>
            </div>

            <form class="auth-form" novalidate>
                
                <div class="plan-selector">
                    <div class="plan-card selected">
                        <span class="plan-name">Solo</span>
                        <span class="plan-desc">1 User</span>
                    </div>
                    <div class="plan-card">
                        <span class="plan-name">Studio</span>
                        <span class="plan-desc">2-5 Users</span>
                    </div>
                    <div class="plan-card">
                        <span class="plan-name">Clinic</span>
                        <span class="plan-desc">Unlimited</span>
                    </div>
                </div>

                <div class="input-row">
                    <div class="form-group input-group">
                        <label>Full Name</label>
                        <input type="text" name="name" class="form-input" placeholder="Sarah M." required>
                    </div>
                    <div class="form-group input-group">
                        <label>Business Name</label>
                        <input type="text" name="business" class="form-input" placeholder="Volzyne Aesthetics" required>
                    </div>
                </div>

                <div class="form-group input-group">
                    <label>Email address</label>
                    <input type="email" name="email" class="form-input" placeholder="name@clinic.com" required>
                </div>

                <div class="input-row">
                    <div class="form-group input-group">
                        <label>Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group input-group">
                        <label>Confirm Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label" style="align-items: flex-start; line-height: 1.4;">
                        <input type="checkbox" name="terms" required style="margin-top: 2px;">
                        <span>I agree to the <a href="#" class="text-link">Terms of Service</a> and <a href="#" class="text-link">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem;">
                    Create Account
                </button>
            </form>

            <div class="divider">or continue with</div>

            <button type="button" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign up with Google
            </button>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="text-link">Log in</a>
            </div>

        </div>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
